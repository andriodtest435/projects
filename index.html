<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Things I Made Instead of Sleeping</title>
  <meta name="description" content="Home base for all my coding projects — live apps, local builds, and research." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --plum-300: #f0a8ba;
      --plum-400: #e07890;
      --plum-500: #c2415e;
      --plum-600: #8b1a3b;
      --plum-700: #6d1430;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background-color: #09070a;
      color: #f4f4f5;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }
    ::selection { background: rgba(194, 65, 94, 0.35); color: #fff; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3a3440; border-radius: 99px; }

    /* ---- Ambient background: aurora glows + dot grid + vignette ---- */
    .ambient {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .glow {
      position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.5;
    }
    .glow-1 {
      width: 480px; height: 480px; top: -140px; left: -100px;
      background: radial-gradient(circle, rgba(139,26,59,0.55), transparent 70%);
      animation: drift 26s ease-in-out infinite alternate;
    }
    .glow-2 {
      width: 560px; height: 560px; bottom: -180px; right: -120px;
      background: radial-gradient(circle, rgba(109,20,48,0.5), transparent 70%);
      animation: drift 38s ease-in-out infinite alternate-reverse;
    }
    .glow-3 {
      width: 380px; height: 380px; top: 35%; left: 55%;
      background: radial-gradient(circle, rgba(194,65,94,0.22), transparent 70%);
      animation: drift 32s ease-in-out infinite alternate;
    }
    .dotgrid {
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.14) 1px, transparent 1px);
      background-size: 26px 26px;
      opacity: 0.16;
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 35%, black 30%, transparent 75%);
      mask-image: radial-gradient(ellipse 70% 60% at 50% 35%, black 30%, transparent 75%);
    }
    .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 90% 80% at 50% 40%, transparent 55%, rgba(0,0,0,0.55) 100%);
    }
    @keyframes drift {
      from { transform: translate3d(0, 0, 0) scale(1); }
      50%  { transform: translate3d(60px, -40px, 0) scale(1.12); }
      to   { transform: translate3d(-40px, 50px, 0) scale(0.96); }
    }

    /* ---- Layout ---- */
    .page {
      position: relative; z-index: 1;
      max-width: 1120px; margin: 0 auto;
      padding: 4.5rem 2rem 5rem;
    }
    @media (max-width: 640px) { .page { padding: 3rem 1.25rem 4rem; } }

    .eyebrow {
      font-size: 0.6875rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.14em; color: #6d6875;
      display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;
    }
    .eyebrow::after {
      content: ''; height: 1px; flex: 1; max-width: 80px;
      background: linear-gradient(90deg, rgba(194,65,94,0.5), transparent);
    }
    .display { font-family: 'Space Grotesk', 'Inter', sans-serif; letter-spacing: -0.03em; }
    h1 {
      font-size: clamp(1.9rem, 5vw, 2.9rem);
      font-weight: 700; color: #fafafa; margin: 0 0 0.5rem; line-height: 1.12;
    }
    .text-gradient-plum {
      background: linear-gradient(90deg, #f0a8ba, #c2415e);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .subtitle { color: #71717a; font-size: 0.95rem; margin: 0 0 2.5rem; }

    /* ---- Filter chips ---- */
    .chips { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.75rem; }
    .chip {
      padding: 0.375rem 0.875rem; border-radius: 999px;
      font-size: 0.75rem; font-weight: 500; font-family: inherit;
      color: #8b8792; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      transition: all 0.2s ease; cursor: pointer;
    }
    .chip:hover { color: #d4d0d8; border-color: rgba(255,255,255,0.16); background: rgba(255,255,255,0.06); }
    .chip-active {
      color: #f0a8ba; background: rgba(139,26,59,0.22);
      border-color: rgba(224,120,144,0.35);
      box-shadow: 0 0 16px -6px rgba(194,65,94,0.5);
    }

    /* ---- Grid + glass cards ---- */
    .grid {
      display: grid; gap: 1rem;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    }
    .glass-card {
      position: relative;
      background: linear-gradient(160deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012));
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 1rem;
      padding: 1.25rem;
      display: flex; flex-direction: column; gap: 0.8rem;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, transform 0.15s ease;
      animation: rise 0.5s ease backwards;
    }
    .glass-card::before {
      content: ''; position: absolute; inset: 0 0 auto 0; height: 1px;
      border-radius: 1rem 1rem 0 0;
      background: linear-gradient(90deg, transparent 5%, rgba(255,255,255,0.14) 50%, transparent 95%);
      pointer-events: none;
    }
    .glass-card:hover {
      transform: translateY(-2px);
      border-color: rgba(224,120,144,0.28);
      background: linear-gradient(160deg, rgba(255,255,255,0.06), rgba(139,26,59,0.05));
      box-shadow: 0 16px 48px -16px rgba(139,26,59,0.45), 0 0 0 1px rgba(224,120,144,0.05);
    }
    @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .badges { display: flex; flex-wrap: wrap; gap: 0.375rem; align-items: center; }
    .badge {
      font-size: 0.6875rem; font-weight: 600; padding: 0.15rem 0.6rem;
      border-radius: 999px; letter-spacing: 0.02em;
    }
    .badge-live { color: #6ee7a0; background: rgba(34,197,94,0.12); border: 1px solid rgba(110,231,160,0.25); }
    .badge-local { color: #a1a1aa; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); }
    .badge-research { color: #fbbf6e; background: rgba(251,191,110,0.1); border: 1px solid rgba(251,191,110,0.22); }
    .category {
      font-size: 0.6875rem; color: #71717a;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.06);
      padding: 0.15rem 0.6rem; border-radius: 999px;
    }
    .lock { font-size: 0.6875rem; color: #8b8792; margin-left: auto; white-space: nowrap; }

    .card-title { font-size: 0.95rem; font-weight: 600; color: #f4f4f5; margin: 0 0 0.3rem; }
    .card-desc { font-size: 0.8rem; color: #8b8792; line-height: 1.55; margin: 0; }

    .tags { display: flex; flex-wrap: wrap; gap: 0.4rem 0.6rem; }
    .tag { font-size: 0.7rem; color: #56505c; }

    .card-footer {
      margin-top: auto; padding-top: 0.75rem;
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex; flex-direction: column; gap: 0.45rem;
    }
    .open-link {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-size: 0.8rem; font-weight: 600; color: var(--plum-400);
      text-decoration: none; transition: color 0.2s ease; width: fit-content;
    }
    .open-link:hover { color: var(--plum-300); }
    .pending { font-size: 0.75rem; color: #6d6875; font-style: italic; }
    .meta { font-size: 0.7rem; color: #56505c; line-height: 1.5; word-break: break-all; }
    .meta code {
      font-family: ui-monospace, 'Cascadia Code', Consolas, monospace;
      font-size: 0.68rem; color: #8b8792;
      background: rgba(255,255,255,0.05); padding: 0.1rem 0.35rem; border-radius: 0.3rem;
    }

    footer {
      margin-top: 4rem; text-align: center;
      font-size: 0.72rem; color: #47424d;
    }
    footer .dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--plum-400); margin-right: 0.45rem; vertical-align: middle;
      animation: pulse-dot 2.4s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(224,120,144,0.5); }
      50%      { opacity: 0.6; box-shadow: 0 0 0 5px rgba(224,120,144,0); }
    }
  </style>
</head>
<body>
  <div class="ambient">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
    <div class="dotgrid"></div>
    <div class="vignette"></div>
  </div>

  <main class="page">
    <p class="eyebrow">Coding Projects · Home Base</p>
    <h1 class="display">Things I Made <span class="text-gradient-plum">Instead of Sleeping</span></h1>
    <p class="subtitle">Proof that the night is productive — every project, one place.</p>

    <div class="chips" id="chips"></div>
    <div class="grid" id="grid"></div>

    <footer><span class="dot"></span>Built at 2am, like everything else here.</footer>
  </main>

  <script>
    // ============================================================
    //  EDIT ME — this array is the whole site. Add / remove / tweak
    //  projects here, save, commit, push. That's the entire workflow.
    //  type: 'live' (hosted app), 'local' (runs on my machine),
    //        'research' (idea / exploration phase)
    // ============================================================
    const PROJECTS = [
      {
        name: 'MoveMinder',
        type: 'live',
        category: 'PWA',
        description: 'Cross-device movement reminder. Every 30 minutes, every registered device rings; dismiss on any one and it stops everywhere. No snooze, no mercy. Real-time sync plus push notifications, with an Alexa skill hooked in.',
        tags: ['nodejs', 'socketio', 'react', 'webpush', 'railway'],
        url: 'https://moveminder-production.up.railway.app',
        locked: true,
      },
      {
        name: 'Tims Survey',
        type: 'live',
        category: 'Automation',
        description: 'Personal TellTims survey auto-filler — turns Tim Hortons receipt surveys into done-in-seconds instead of five minutes of clicking.',
        tags: ['nextjs', 'playwright', 'typescript', 'render'],
        url: 'https://tims-survey.onrender.com/',
        locked: true,
      },
      {
        name: 'Personal Dashboard',
        type: 'local',
        category: 'Website',
        description: 'Personal dashboard and portfolio — ideas bank with an Eisenhower matrix, project showcase, bucket list with proof previews, and task ownership tracking. Aurora-glass design (which this page borrows).',
        tags: ['react', 'vite', 'typescript', 'tailwind'],
        localPath: 'D:\\Coding Projects\\Personal Website',
        runCmd: 'npm run dev',
      },
      {
        name: 'FlipPilot',
        type: 'local',
        category: 'Automation',
        description: 'Visual arbitrage and resale assistant for Kijiji, Facebook Marketplace, Karrot, and eBay. Finds underpriced local items, values them against eBay sold prices, then drafts listings, markdowns, and buyer replies from a web dashboard.',
        tags: ['nodejs', 'playwright', 'llm', 'dashboard'],
        localPath: 'D:\\Coding Projects\\Marketplace automation',
        runCmd: 'Start.bat',
      },
      {
        name: 'Get me dat link',
        type: 'local',
        category: 'Extension',
        description: 'Chrome/Edge Manifest V3 extension — save the current tab with one click or shortcut, organize links into lists, export them, and sync to Google Sheets, Notion, or a local CSV.',
        tags: ['chrome-extension', 'react', 'vite', 'notion'],
        localPath: 'D:\\Coding Projects\\Get me dat link',
        runCmd: 'npm run build:extension',
      },
      {
        name: 'Phal — Habit Tracker',
        type: 'local',
        category: 'Mobile App',
        description: 'Habit tracker where you stake coins on your commitments and lose them if you miss a day. Photo check-ins, streaks, XP and levels. React Native mobile app plus a Next.js web app in one monorepo.',
        tags: ['react-native', 'expo', 'nextjs', 'supabase'],
        localPath: 'D:\\Coding Projects\\Phal - Habit Tracker',
        runCmd: 'npm run mobile / npm run web',
      },
      {
        name: 'Fintech Empire',
        type: 'research',
        category: 'Concept',
        description: 'Early-stage fintech exploration. Blueprints and research only — details classified until it ships.',
        tags: ['fintech', 'research'],
        localPath: 'D:\\Coding Projects\\Fintech Empire',
      },
      {
        name: 'SuperAI',
        type: 'research',
        category: 'Concept',
        description: 'Research into building a local, self-improving AI assistant. Currently a pile of deep-research notes waiting to become code.',
        tags: ['ai', 'ollama', 'research'],
        localPath: 'D:\\Coding Projects\\SuperAI',
      },
    ];

    const FILTERS = [
      { value: 'all',      label: 'All' },
      { value: 'live',     label: 'Live' },
      { value: 'local',    label: 'Local' },
      { value: 'research', label: 'Research' },
    ];
    const BADGE = {
      live:     { cls: 'badge-live',     label: '● Live' },
      local:    { cls: 'badge-local',    label: 'Runs locally' },
      research: { cls: 'badge-research', label: 'Research' },
    };

    const grid = document.getElementById('grid');
    const chipsEl = document.getElementById('chips');
    let active = 'all';

    function esc(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
    }

    function cardHTML(p, i) {
      const badge = BADGE[p.type];
      let footer = '';
      if (p.type === 'live') {
        footer = p.url
          ? `<a class="open-link" href="${esc(p.url)}" target="_blank" rel="noopener noreferrer">Open app ↗</a>`
          : `<span class="pending">Deployed — link coming soon</span>`;
      }
      const meta = [];
      if (p.localPath) meta.push(`<span class="meta">📁 ${esc(p.localPath)}</span>`);
      if (p.runCmd)    meta.push(`<span class="meta">▶ <code>${esc(p.runCmd)}</code></span>`);

      return `
        <article class="glass-card" style="animation-delay:${i * 60}ms">
          <div class="badges">
            <span class="badge ${badge.cls}">${badge.label}</span>
            <span class="category">${esc(p.category)}</span>
            ${p.locked ? '<span class="lock">🔒 password-protected</span>' : ''}
          </div>
          <div>
            <h3 class="card-title">${esc(p.name)}</h3>
            <p class="card-desc">${esc(p.description)}</p>
          </div>
          <div class="tags">${p.tags.map(t => `<span class="tag">#${esc(t)}</span>`).join('')}</div>
          ${footer || meta.length ? `<div class="card-footer">${footer}${meta.join('')}</div>` : ''}
        </article>`;
    }

    function render() {
      const list = active === 'all' ? PROJECTS : PROJECTS.filter(p => p.type === active);
      grid.innerHTML = list.map(cardHTML).join('');
      chipsEl.innerHTML = FILTERS.map(f =>
        `<button class="chip${f.value === active ? ' chip-active' : ''}" data-v="${f.value}">${f.label}</button>`
      ).join('');
    }

    chipsEl.addEventListener('click', e => {
      const btn = e.target.closest('button[data-v]');
      if (btn) { active = btn.dataset.v; render(); }
    });

    render();
  </script>
</body>
</html>
